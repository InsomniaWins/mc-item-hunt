spring.application.name=Minecraft Item Hunt API

spring.datasource.url=jdbc:mysql://localhost:3306/mc_item_hunt_db
spring.datasource.username=mc_item_hunt_user
spring.datasource.password=${DB_PASSWORD:dummy_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# look for local properties file
spring.config.import=optional:file:src/main/resources/application-local.properties